name: Backend CI

on:
  pull_request:
    paths: ['backend/**', '.github/workflows/backend-ci.yml']

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    services:
      # Spin up local Postgres + Redis for integration tests.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sc_test
          POSTGRES_USER: sc_test
          POSTGRES_PASSWORD: sc_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      # ── Code quality ──────────────────────────────────────────────
      - name: Lint (ruff)
        run: ruff check backend/

      - name: Type check (mypy)
        run: mypy backend/app --ignore-missing-imports

      # ── Security ──────────────────────────────────────────────────
      - name: SAST — Bandit
        run: bandit -r backend/app -ll -f json -o bandit-report.json

      - name: Secrets scan — TruffleHog
        run: |
          docker run --rm \
            --volume "${{ github.workspace }}:/repo:ro" \
            trufflesecurity/trufflehog:3.88.0 \
            filesystem --directory=/repo/backend --fail

      - name: Dependency CVE scan — Safety
        run: safety check -r backend/requirements.txt --full-report

      # ── Tests ─────────────────────────────────────────────────────
      - name: Run unit tests
        run: |
          pytest backend/tests/unit/ -v \
            --cov=backend/app \
            --cov-report=xml \
            --cov-fail-under=75
        env:
          DATABASE_URL: postgresql://sc_test:sc_test@localhost/sc_test
          REDIS_URL: redis://localhost:6379

      - name: Run integration tests
        run: |
          pytest backend/tests/integration/ -v \
            --timeout=30
        env:
          DATABASE_URL: postgresql://sc_test:sc_test@localhost/sc_test
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: test

      # ── Build Docker image ─────────────────────────────────────────
      - name: Build Docker image (verify it builds)
        run: |
          docker build -f infrastructure/docker/backend.Dockerfile \
            -t sc-api-service:pr-${{ github.event.pull_request.number }} \
            backend/

      - name: Container image scan — Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sc-api-service:pr-${{ github.event.pull_request.number }}
          severity: HIGH,CRITICAL
          exit-code: 1
