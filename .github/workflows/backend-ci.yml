name: Backend CI

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'infrastructure/docker/backend.Dockerfile'
      - '.github/workflows/backend-ci.yml'

permissions:
  contents: read

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    env:
      IMAGE_REF: sc-api-service:${{ github.sha }}
    services:
      # Spin up local Postgres + Redis for integration tests.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sc_test
          POSTGRES_USER: sc_test
          POSTGRES_PASSWORD: sc_test
        ports:
          - 5432
        options: >-
          --health-cmd "pg_isready -U sc_test -d sc_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Verify integration service ports
        run: |
          python -c "import os, socket; socket.create_connection(('127.0.0.1', int(os.environ['POSTGRES_PORT'])), timeout=5).close(); socket.create_connection(('127.0.0.1', int(os.environ['REDIS_PORT'])), timeout=5).close()"
        env:
          POSTGRES_PORT: ${{ job.services.postgres.ports[5432] }}
          REDIS_PORT: ${{ job.services.redis.ports[6379] }}

      # ── Code quality ──────────────────────────────────────────────
      - name: Lint (ruff)
        run: ruff check backend/

      - name: Type check (mypy)
        run: mypy backend/app --ignore-missing-imports

      # ── Security ──────────────────────────────────────────────────
      - name: SAST — Bandit
        run: bandit -r backend/app -ll -f json -o bandit-report.json

      - name: Secrets scan — TruffleHog
        run: |
          docker run --rm \
            --volume "${{ github.workspace }}:/repo:ro" \
            trufflesecurity/trufflehog:3.88.0 \
            filesystem /repo/backend --fail

      - name: Dependency CVE scan — Safety
        run: safety check -r backend/requirements.txt --full-report

      # ── Tests ─────────────────────────────────────────────────────
      - name: Run unit tests
        run: |
          pytest backend/tests/unit/ -v \
            --cov=backend/app \
            --cov-report=xml \
            --cov-fail-under=75
        env:
          DATABASE_URL: postgresql://sc_test:sc_test@127.0.0.1:${{ job.services.postgres.ports[5432] }}/sc_test
          REDIS_URL: redis://127.0.0.1:${{ job.services.redis.ports[6379] }}/0

      - name: Run integration tests
        run: |
          pytest backend/tests/integration/ -v \
            --timeout=30
        env:
          DATABASE_URL: postgresql://sc_test:sc_test@127.0.0.1:${{ job.services.postgres.ports[5432] }}/sc_test
          REDIS_URL: redis://127.0.0.1:${{ job.services.redis.ports[6379] }}/0
          ENVIRONMENT: test

      # ── Build Docker image ─────────────────────────────────────────
      - name: Build Docker image (verify it builds)
        run: |
          docker build --pull -f infrastructure/docker/backend.Dockerfile \
            -t "$IMAGE_REF" \
            backend/

      - name: Verify container base OS
        run: |
          container_os="$(docker run --rm --entrypoint sh "$IMAGE_REF" \
            -c '. /etc/os-release; printf "%s" "$ID"')"
          echo "Container base OS: $container_os"
          test "$container_os" = "alpine"

      - name: Container image scan — Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          scan-type: image
          format: table
          vuln-type: os,library
          scanners: vuln,secret
          ignore-unfixed: false
          severity: CRITICAL,HIGH
          exit-code: '1'
