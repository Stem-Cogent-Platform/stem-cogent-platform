name: Infrastructure CD

on:
  pull_request:
    branches: [main, staging]
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/infrastructure-cd.yml'
  push:
    branches: [main, staging]
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/infrastructure-cd.yml'

env:
  TF_IN_AUTOMATION: 'true'
  TF_INPUT: 'false'
  AWS_REGION: eu-west-1

jobs:
  pull-request-plan:
    name: Plan (${{ github.base_ref == 'main' && 'production' || 'staging' }})
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.base_ref == 'main' && 'production-plan' || 'staging-plan' }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    env:
      TF_ENV: ${{ github.base_ref == 'main' && 'prod' || 'staging' }}
      TF_ROOT: infrastructure/terraform/environments/${{ github.base_ref == 'main' && 'prod' || 'staging' }}
      AWS_ROLE_ARN: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
      TF_VAR_expected_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KMS_KEY_ARN: ${{ vars.TF_STATE_KMS_KEY_ARN }}
      TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify deployment configuration
        shell: bash
        run: |
          for variable in \
            AWS_ROLE_ARN \
            TF_VAR_expected_account_id \
            TF_STATE_BUCKET \
            TF_STATE_KMS_KEY_ARN \
            TF_STATE_LOCK_TABLE; do
            test -n "${!variable}" || {
              echo "$variable is not configured in the GitHub plan environment." >&2
              exit 1
            }
          done
          test -d "$TF_ROOT" || {
            echo "Terraform root does not exist: $TF_ROOT" >&2
            exit 1
          }
          test -f "$TF_ROOT/$TF_ENV.tfvars" || {
            echo "Terraform variable file does not exist: $TF_ROOT/$TF_ENV.tfvars" >&2
            exit 1
          }

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: sc-terraform-plan-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.x'
          terraform_wrapper: false

      - name: Terraform format check
        run: terraform fmt -check -recursive
        working-directory: infrastructure/terraform

      - name: Terraform init
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=stem-cogent/$TF_ENV/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true" \
            -backend-config="kms_key_id=$TF_STATE_KMS_KEY_ARN" \
            -backend-config="dynamodb_table=$TF_STATE_LOCK_TABLE"
        working-directory: ${{ env.TF_ROOT }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ env.TF_ROOT }}

      - name: Terraform plan
        id: plan
        continue-on-error: true
        shell: bash
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -out=tfplan \
            -var-file="$TF_ENV.tfvars" 2>&1 | tee plan-output.txt
        working-directory: ${{ env.TF_ROOT }}

      - name: Post plan to pull request
        if: always() && steps.plan.outcome != 'skipped'
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT_FILE: ${{ env.TF_ROOT }}/plan-output.txt
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          TF_ENVIRONMENT: ${{ env.TF_ENV }}
        with:
          script: |
            const fs = require('fs');
            const marker = `<!-- stem-cogent-terraform-plan:${process.env.TF_ENVIRONMENT} -->`;
            const outcome = process.env.PLAN_OUTCOME === 'success' ? 'succeeded' : 'failed';
            const rawPlan = fs.existsSync(process.env.PLAN_OUTPUT_FILE)
              ? fs.readFileSync(process.env.PLAN_OUTPUT_FILE, 'utf8')
              : 'Terraform did not produce plan output.';
            const maxPlanLength = 60000;
            const plan = rawPlan.length > maxPlanLength
              ? `${rawPlan.slice(0, maxPlanLength)}\n\n... output truncated ...`
              : rawPlan;
            const body = [
              marker,
              `### Terraform plan — ${process.env.TF_ENVIRONMENT}`,
              `Plan **${outcome}** for commit \`${context.sha}\`.`,
              '<details><summary>Show plan output</summary>',
              '',
              '```text',
              plan,
              '```',
              '</details>',
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const previous = comments.find(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail when Terraform plan fails
        if: steps.plan.outcome == 'failure'
        run: exit 1

  deployment-plan:
    name: Deployment plan (${{ github.ref_name }})
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.ref_name == 'main' && 'production-plan' || 'staging-plan' }}
    permissions:
      contents: read
      id-token: write
    env:
      TF_ENV: ${{ github.ref_name == 'main' && 'prod' || 'staging' }}
      TF_ROOT: infrastructure/terraform/environments/${{ github.ref_name == 'main' && 'prod' || 'staging' }}
      AWS_ROLE_ARN: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
      TF_VAR_expected_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KMS_KEY_ARN: ${{ vars.TF_STATE_KMS_KEY_ARN }}
      TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify deployment configuration
        shell: bash
        run: |
          for variable in \
            AWS_ROLE_ARN \
            TF_VAR_expected_account_id \
            TF_STATE_BUCKET \
            TF_STATE_KMS_KEY_ARN \
            TF_STATE_LOCK_TABLE; do
            test -n "${!variable}" || {
              echo "$variable is not configured in the GitHub plan environment." >&2
              exit 1
            }
          done
          test -d "$TF_ROOT" || {
            echo "Terraform root does not exist: $TF_ROOT" >&2
            exit 1
          }
          test -f "$TF_ROOT/$TF_ENV.tfvars" || {
            echo "Terraform variable file does not exist: $TF_ROOT/$TF_ENV.tfvars" >&2
            exit 1
          }

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: sc-terraform-plan-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.x'
          terraform_wrapper: false

      - name: Terraform format check
        run: terraform fmt -check -recursive
        working-directory: infrastructure/terraform

      - name: Terraform init
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=stem-cogent/$TF_ENV/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true" \
            -backend-config="kms_key_id=$TF_STATE_KMS_KEY_ARN" \
            -backend-config="dynamodb_table=$TF_STATE_LOCK_TABLE"
        working-directory: ${{ env.TF_ROOT }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ env.TF_ROOT }}

      - name: Terraform plan
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -out=tfplan \
            -var-file="$TF_ENV.tfvars"
        working-directory: ${{ env.TF_ROOT }}

      - name: Upload reviewed plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ env.TF_ENV }}-${{ github.sha }}
          path: ${{ env.TF_ROOT }}/tfplan
          if-no-files-found: error
          retention-days: 1

  apply:
    name: Apply (${{ github.ref_name }})
    if: github.event_name == 'push'
    needs: deployment-plan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    concurrency:
      group: terraform-apply-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    env:
      TF_ENV: ${{ github.ref_name == 'main' && 'prod' || 'staging' }}
      TF_ROOT: infrastructure/terraform/environments/${{ github.ref_name == 'main' && 'prod' || 'staging' }}
      AWS_ROLE_ARN: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
      TF_VAR_expected_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KMS_KEY_ARN: ${{ vars.TF_STATE_KMS_KEY_ARN }}
      TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify deployment configuration
        shell: bash
        run: |
          for variable in \
            AWS_ROLE_ARN \
            TF_VAR_expected_account_id \
            TF_STATE_BUCKET \
            TF_STATE_KMS_KEY_ARN \
            TF_STATE_LOCK_TABLE; do
            test -n "${!variable}" || {
              echo "$variable is not configured in the GitHub apply environment." >&2
              exit 1
            }
          done
          test -d "$TF_ROOT" || {
            echo "Terraform root does not exist: $TF_ROOT" >&2
            exit 1
          }

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: sc-terraform-apply-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.x'
          terraform_wrapper: false

      - name: Terraform init
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=stem-cogent/$TF_ENV/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true" \
            -backend-config="kms_key_id=$TF_STATE_KMS_KEY_ARN" \
            -backend-config="dynamodb_table=$TF_STATE_LOCK_TABLE"
        working-directory: ${{ env.TF_ROOT }}

      - name: Download reviewed plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ env.TF_ENV }}-${{ github.sha }}
          path: ${{ env.TF_ROOT }}

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan
        working-directory: ${{ env.TF_ROOT }}
