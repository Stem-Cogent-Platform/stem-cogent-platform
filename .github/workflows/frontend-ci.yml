name: Frontend CI

on:
  pull_request:
    paths: ['frontend/**', '.github/workflows/frontend-ci.yml']

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Use project npm version
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/

      - name: Type check
        run: npm run type-check
        working-directory: frontend/

      - name: Lint (ESLint)
        run: npm run lint
        working-directory: frontend/

      - name: Unit tests (Vitest)
        run: npm run test:unit -- --coverage
        working-directory: frontend/

      - name: Build (verify production build succeeds)
        run: npm run build
        working-directory: frontend/
        env:
          NEXT_PUBLIC_API_URL: https://api.staging.stemcogent.com
          NEXT_PUBLIC_WS_URL: wss://api.staging.stemcogent.com

      - name: Bundle size check
        run: node scripts/check-bundle-size.js --max-kb=200
        working-directory: frontend/
